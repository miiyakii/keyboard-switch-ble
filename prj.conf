#
# prj.conf — KVM Dongle (keyboard-only BLE HID peripheral)
#
# SPDX-License-Identifier: Apache-2.0
#

CONFIG_NCS_SAMPLES_DEFAULTS=y
CONFIG_BOARD_SERIAL_BACKEND_CDC_ACM=n

# GPIO (LED + button)
CONFIG_GPIO=y

# PWM (breathing / blink effects on red and blue LEDs)
CONFIG_PWM=y

# Logging disabled — dongle has no physical UART and no J-Link
CONFIG_LOG=n
CONFIG_UART_CONSOLE=n

# Bluetooth
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_SMP=y
CONFIG_BT_ATT_TX_COUNT=5

CONFIG_BT_DEVICE_NAME="BLE-KB-Relay"
CONFIG_BT_DEVICE_APPEARANCE=961

CONFIG_BT_GATT_AUTO_SEC_REQ=n
CONFIG_BT_AUTO_PHY_UPDATE=n

# Connection parameters — low latency (7.5ms–15ms → up to 133Hz)
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=12
CONFIG_BT_PERIPHERAL_PREF_LATENCY=0
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=100

# Just Works pairing (no PIN), with bonding + Filter Accept List
CONFIG_BT_PRIVACY=y
CONFIG_BT_FILTER_ACCEPT_LIST=y
CONFIG_BT_MAX_CONN=1
CONFIG_BT_MAX_PAIRED=2
# Multiple identities: ID 1 = normal peer, ID 2 = temporary identity for bt_id_reset()
CONFIG_BT_ID_MAX=3

# HIDS (keyboard only, single client)
CONFIG_BT_HIDS=y
CONFIG_BT_HIDS_MAX_CLIENT_COUNT=1
CONFIG_BT_HIDS_DEFAULT_PERM_RW_ENCRYPT=y
CONFIG_BT_GATT_UUID16_POOL_SIZE=40
CONFIG_BT_GATT_CHRC_POOL_SIZE=20
CONFIG_BT_CONN_CTX=y

# Battery Service (required for HID profile)
CONFIG_BT_BAS=y

# Device Information Service
CONFIG_BT_DIS=y
CONFIG_BT_DIS_MANUF_NAME=y
CONFIG_BT_DIS_MANUF_NAME_STR="KBRelay"
CONFIG_BT_DIS_PNP=y
CONFIG_BT_DIS_PNP_VID_SRC=2
CONFIG_BT_DIS_PNP_VID=0x1915
CONFIG_BT_DIS_PNP_PID=0x0004
CONFIG_BT_DIS_PNP_VER=0x0100

# Bond persistence
CONFIG_SETTINGS=y
CONFIG_BT_SETTINGS=y
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y

# USB CDC-ACM (new USBD stack)
CONFIG_USB_DEVICE_STACK_NEXT=y
CONFIG_SERIAL=y
CONFIG_USBD_CDC_ACM_CLASS=y
CONFIG_UART_LINE_CTRL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_HWINFO=y
CONFIG_SAMPLE_USBD_MANUFACTURER="KBRelay"
CONFIG_SAMPLE_USBD_PRODUCT="BLE KB Relay"
CONFIG_SAMPLE_USBD_PID=0x0004

# Stack sizes
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_HEAP_MEM_POOL_SIZE=8192
